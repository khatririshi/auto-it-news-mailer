name: Daily IT News Mailer

on:
  # Runs every day at 02:30 UTC = 08:00 IST (UTC+5:30)
  schedule:
    - cron: "30 2 * * *"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # ── 1. Checkout the repo ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ───────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Write the .env file from GitHub Secrets ─────────────────────────
      #
      #  ⚠️  YOU MUST ADD THESE 4 SECRETS IN YOUR REPO FIRST:
      #  GitHub repo → Settings → Secrets and variables → Actions → New secret
      #
      #  Secret name          Value
      #  ─────────────────── ─────────────────────────────────────────────────
      #  NEWS_API_KEY         Your newsapi.org key  (e.g. c9ed09a6421c...)
      #  SENDER_EMAIL         khatririshi37@gmail.com
      #  SENDER_PASSWORD      Your Gmail App Password (16 chars, spaces OK)
      #  RECIPIENT_EMAIL      khatririshi37@gmail.com
      #
      - name: Create .env from secrets
        run: |
          cat > .env << 'EOF'
          NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}
          SENDER_EMAIL=${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD=${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL=${{ secrets.RECIPIENT_EMAIL }}
          EOF

      # ── 5. Verify secrets are present before running ───────────────────────
      - name: Verify secrets are set
        run: |
          python - << 'EOF'
          import os, sys
          missing = []
          for key in ["NEWS_API_KEY","SENDER_EMAIL","SENDER_PASSWORD","RECIPIENT_EMAIL"]:
              val = open(".env").read()
              if f"{key}=$\n" in val or f"{key}=\n" in val or f"{key}=" not in val:
                  missing.append(key)
          if missing:
              print(f"❌ MISSING GitHub Secrets: {', '.join(missing)}")
              print("   Go to: Settings → Secrets and variables → Actions → New secret")
              sys.exit(1)
          else:
              print("✅ All 4 secrets are present")
          EOF

      # ── 6. Run the mailer ──────────────────────────────────────────────────
      - name: Send IT News Email
        run: python main.py --now

      # ── 7. Upload the log on failure so you can debug it ──────────────────
      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mailer-log
          path: mailer.log
          retention-days: 7
