<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily IT News Digest</title>
</head>
<body style="margin:0;padding:0;background-color:#0f1117;font-family:'Segoe UI',Arial,sans-serif;">

  <!-- ── Outer wrapper ── -->
  <table width="100%" cellpadding="0" cellspacing="0" border="0"
         style="background-color:#0f1117;padding:30px 0;">
    <tr>
      <td align="center">

        <!-- ── Email card ── -->
        <table width="640" cellpadding="0" cellspacing="0" border="0"
               style="max-width:640px;width:100%;background-color:#1a1d27;
                      border-radius:16px;overflow:hidden;
                      box-shadow:0 8px 32px rgba(0,0,0,0.5);">

          <!-- ════ HEADER ════ -->
          <tr>
            <td style="background:linear-gradient(135deg,#1e3a5f 0%,#0d47a1 50%,#1565c0 100%);
                       padding:36px 40px;text-align:center;">
              <p style="margin:0 0 8px 0;font-size:13px;letter-spacing:3px;
                        text-transform:uppercase;color:#90caf9;">
                AUTOMATED DIGEST
              </p>
              <h1 style="margin:0;font-size:30px;font-weight:700;color:#ffffff;
                         letter-spacing:-0.5px;">
                🖥️ Daily IT News
              </h1>
              <p style="margin:10px 0 0 0;font-size:14px;color:#90caf9;">
                {{DATE}}
              </p>

              <!-- Divider line -->
              <div style="margin:20px auto 0;width:60px;height:3px;
                          background:linear-gradient(90deg,#42a5f5,#7c4dff);
                          border-radius:2px;"></div>
            </td>
          </tr>

          <!-- ════ INTRO BAR ════ -->
          <tr>
            <td style="background-color:#16213e;padding:14px 40px;">
              <p style="margin:0;font-size:13px;color:#78909c;text-align:center;">
                Your curated selection of
                <span style="color:#42a5f5;font-weight:600;">{{ARTICLE_COUNT}} top stories</span>
                in AI · Cybersecurity · Dev · Gadgets · Startups
              </p>
            </td>
          </tr>

          <!-- ════ ARTICLES (injected by Python) ════ -->
          <tr>
            <td style="padding:24px 32px;">
              {{ARTICLES}}
            </td>
          </tr>

          <!-- ════ FOOTER ════ -->
          <tr>
            <td style="background-color:#12151f;padding:28px 40px;text-align:center;
                       border-top:1px solid #2a2d3e;">
              <p style="margin:0 0 6px 0;font-size:13px;color:#546e7a;">
                Delivered daily by <strong style="color:#42a5f5;">Auto IT News Mailer</strong>
              </p>
              <p style="margin:0;font-size:11px;color:#37474f;">
                News sourced from
                <a href="https://newsapi.org" style="color:#546e7a;text-decoration:none;">
                  NewsAPI.org
                </a>
                &nbsp;·&nbsp; Powered by Python &amp; Gmail SMTP
              </p>
            </td>
          </tr>

        </table>
        <!-- /email card -->

      </td>
    </tr>
  </table>

</body>
</html>
